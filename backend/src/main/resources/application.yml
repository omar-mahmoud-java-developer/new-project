spring:
  application:
    name: enterprise-erp
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp}
    username: ${SPRING_DATASOURCE_USERNAME:erp}
    password: ${SPRING_DATASOURCE_PASSWORD:erp}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: filesystem:../database/migrations
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-32chars-minimum}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  security:
    cors:
      allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  config: classpath:logback-spring.xml
